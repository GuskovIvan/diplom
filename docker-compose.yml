services:
  postgres:
    image: postgres:16-alpine
    container_name: diplom-kanban-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kanban_diplom
      POSTGRES_USER: kanban
      POSTGRES_PASSWORD: kanban_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban -d kanban_diplom"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: diplom-kanban-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres-data:
